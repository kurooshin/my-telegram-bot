<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100dvh;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none}
.container{text-align:center;width:100%;max-width:500px;padding:10px}
h1{font-size:1.5rem;margin-bottom:8px;color:#e94560}
#gameCanvas{display:block;margin:0 auto;background:#16213e;border-radius:12px;border:3px solid #e94560;width:100%;max-width:450px;aspect-ratio:1;touch-action:none}
.score-row{display:flex;justify-content:space-between;padding:8px 4px;font-size:1.1rem;font-weight:bold}
.score-row span{color:#e94560}
#status{font-size:1rem;margin:8px 0;color:#aaa;min-height:1.5em}
#status .key-hint{font-size:.75rem;color:#666}
.btn{padding:10px 28px;border:none;border-radius:8px;font-size:1rem;font-weight:bold;cursor:pointer;transition:.2s;margin:4px}
.btn-primary{background:#e94560;color:#fff}
.btn-primary:hover{background:#c73650}
.btn-secondary{background:#0f3460;color:#fff}
.btn-secondary:hover{background:#1a4a7a}
.leaderboard{margin-top:12px;text-align:left;background:#16213e;border-radius:10px;padding:10px;max-height:250px;overflow-y:auto}
.leaderboard h3{text-align:center;color:#e94560;margin-bottom:6px}
.lb-entry{display:flex;justify-content:space-between;padding:4px 8px;border-bottom:1px solid #0f3460;font-size:.9rem}
.lb-entry:last-child{border-bottom:none}
.lb-rank{color:#e94560;font-weight:bold;min-width:24px}
.lb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px}
.lb-score{font-weight:bold;color:#0f3460}
.lb-entry:nth-child(2) .lb-rank{color:gold}
.lb-entry:nth-child(3) .lb-rank{color:silver}
.lb-entry:nth-child(4) .lb-rank{color:#cd7f32}
.score-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a2ee0;padding:24px;border-radius:16px;text-align:center;z-index:10;backdrop-filter:blur(8px);border:2px solid #e94560;min-width:260px}
.score-popup h2{color:#e94560;margin-bottom:8px;font-size:1.3rem}
.score-popup .final-score{font-size:2.5rem;font-weight:bold;margin:8px 0}
.score-popup .new-high{color:#4ade80;font-size:.9rem;margin-bottom:8px}
.score-popup .btn{margin-top:8px}
.hidden{display:none}
.controls-hint{color:#666;font-size:.7rem;margin-top:4px}
@media(max-width:480px){h1{font-size:1.2rem}.score-row{font-size:.95rem}}
</style>
</head>
<body>
<div class="container">
  <h1>🐍 Snake Game</h1>
  <div class="score-row">
    <div>Score: <span id="score">0</span></div>
    <div>Best: <span id="best">0</span></div>
  </div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div id="status">
    <span id="statusText">Press Start or tap to play</span>
    <div class="key-hint">WASD / Arrow Keys | Swipe to move</div>
  </div>
  <div>
    <button class="btn btn-primary" id="startBtn">▶ Start Game</button>
  </div>
  <div class="leaderboard" id="leaderboard">
    <h3>🏆 Leaderboard</h3>
    <div id="lbEntries"><div style="text-align:center;color:#666;padding:8px">Loading...</div></div>
  </div>
</div>

<div class="score-popup hidden" id="scorePopup">
  <h2>Game Over</h2>
  <div class="final-score" id="finalScore">0</div>
  <div id="highScoreMsg" class="new-high hidden">🏆 New High Score!</div>
  <button class="btn btn-primary" id="playAgainBtn">Play Again</button>
  <button class="btn btn-secondary" id="closePopupBtn">Close</button>
</div>

<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score');
const bestEl=document.getElementById('best');
const statusText=document.getElementById('statusText');
const startBtn=document.getElementById('startBtn');
const scorePopup=document.getElementById('scorePopup');
const finalScoreEl=document.getElementById('finalScore');
const highScoreMsg=document.getElementById('highScoreMsg');
const playAgainBtn=document.getElementById('playAgainBtn');
const closePopupBtn=document.getElementById('closePopupBtn');
const lbEntries=document.getElementById('lbEntries');

let tg = null;
try{if(window.Telegram&&window.Telegram.WebApp){tg=window.Telegram.WebApp;tg.expand()}}catch(e){}

const GRID=20, TICK=150;
let snake, food, dir, nextDir, score, best, gameLoop, running, gameOver;
let touchStartX, touchStartY;
let userId='', userName='Player';

if(tg){
  userId=tg.initDataUnsafe?.user?.id?.toString()||'';
  userName=tg.initDataUnsafe?.user?.first_name||'Player';
}

best=parseInt(localStorage.getItem('snakeBest')||'0');
bestEl.textContent=best;

function init(){
  snake=[{x:10,y:10}];
  dir={x:1,y:0};
  nextDir={x:1,y:0};
  score=0;
  running=false;
  gameOver=false;
  scoreEl.textContent='0';
  food=spawnFood();
}

function spawnFood(){
  let pos;
  do{
    pos={x:Math.floor(Math.random()*GRID),y:Math.floor(Math.random()*GRID)};
  }while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  return pos;
}

function draw(){
  ctx.clearRect(0,0,400,400);
  ctx.fillStyle='#16213e';
  ctx.fillRect(0,0,400,400);
  ctx.fillStyle='#e94560';
  snake.forEach((s,i)=>{
    ctx.fillRect(s.x*20+1,s.y*20+1,18,18);
    if(i===0){ctx.fillStyle='#ff6b81';ctx.fillRect(s.x*20+1,s.y*20+1,18,18)}
  });
  ctx.fillStyle='#4ade80';
  ctx.beginPath();
  ctx.arc(food.x*20+10,food.y*20+10,8,0,Math.PI*2);
  ctx.fill();
  const grid=[0,0,0,0];
}

function move(){
  dir={...nextDir};
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID||snake.some(s=>s.x===head.x&&s.y===head.y)){
    endGame();return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score++;scoreEl.textContent=score;food=spawnFood();
  }else{snake.pop()}
}

function tick(){
  if(!running||gameOver)return;
  move();
  draw();
}

function endGame(){
  running=false;gameOver=true;clearInterval(gameLoop);
  const isHigh=score>best;
  if(isHigh){best=score;localStorage.setItem('snakeBest',best.toString());bestEl.textContent=best}
  finalScoreEl.textContent=score;
  highScoreMsg.classList.toggle('hidden',!isHigh);
  scorePopup.classList.remove('hidden');
  submitScore(score);
  statusText.textContent='Game Over! Score: '+score;
}

function startGame(){
  scorePopup.classList.add('hidden');
  init();running=true;gameOver=false;
  statusText.textContent='Playing...';
  draw();
  if(gameLoop)clearInterval(gameLoop);
  gameLoop=setInterval(tick,TICK);
}

async function submitScore(s){
  try{
    await fetch('/api/leaderboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId,user_name:userName,score:s})});
    loadLeaderboard();
  }catch(e){}
}

async function loadLeaderboard(){
  try{
    const r=await fetch('/api/leaderboard');
    const data=await r.json();
    if(!data.length){lbEntries.innerHTML='<div style="text-align:center;color:#666;padding:8px">No scores yet</div>';return}
    lbEntries.innerHTML=data.map((e,i)=>`
      <div class="lb-entry">
        <span class="lb-rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)}</span>
        <span class="lb-name">${escapeHtml(e.user_name||'Player')}</span>
        <span class="lb-score" style="color:#e94560">${e.score}</span>
      </div>
    `).join('');
  }catch(e){lbEntries.innerHTML='<div style="text-align:center;color:#666;padding:8px">Failed to load</div>'}
}

function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

// Keyboard controls
document.addEventListener('keydown',e=>{
  if(!running&&!(gameOver||scorePopup.classList.contains('hidden')===false))return;
  switch(e.key){
    case 'w':case 'W':case 'ArrowUp':if(dir.y!==1){nextDir={x:0,y:-1}}e.preventDefault();break;
    case 's':case 'S':case 'ArrowDown':if(dir.y!==-1){nextDir={x:0,y:1}}e.preventDefault();break;
    case 'a':case 'A':case 'ArrowLeft':if(dir.x!==1){nextDir={x:-1,y:0}}e.preventDefault();break;
    case 'd':case 'D':case 'ArrowRight':if(dir.x!==-1){nextDir={x:1,y:0}}e.preventDefault();break;
  }
});

// Touch swipe
canvas.addEventListener('touchstart',e=>{
  const t=e.touches[0];
  touchStartX=t.clientX;touchStartY=t.clientY;
  if(!running)startGame()
},{passive:true});

canvas.addEventListener('touchend',e=>{
  if(!touchStartX||!running)return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  const adx=Math.abs(dx),ady=Math.abs(dy);
  if(Math.max(adx,ady)<20)return;
  if(adx>ady){
    if(dx>0&&dir.x!==-1)nextDir={x:1,y:0};
    else if(dx<0&&dir.x!==1)nextDir={x:-1,y:0};
  }else{
    if(dy>0&&dir.y!==-1)nextDir={x:0,y:1};
    else if(dy<0&&dir.y!==1)nextDir={x:0,y:-1};
  }
  touchStartX=0;
},{passive:true});

// Button events
startBtn.addEventListener('click',startGame);
playAgainBtn.addEventListener('click',startGame);
closePopupBtn.addEventListener('click',()=>{scorePopup.classList.add('hidden');statusText.textContent='Press Start or tap to play'});

init();
draw();
loadLeaderboard();
</script>
</body>
</html>
