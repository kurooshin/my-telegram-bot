<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Othello · 2P</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;font-family:'Segoe UI',system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100dvh;overflow:hidden;touch-action:none;user-select:none}
.container{text-align:center;width:100%;max-width:480px;padding:8px;position:relative}
.header{display:flex;justify-content:space-between;align-items:center;padding:4px 8px 8px}
.header h1{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,#4ade80,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.status{font-size:.85rem;padding:4px 12px;border-radius:20px;background:rgba(74,222,128,.1);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-height:28px}
.canvas-wrap{position:relative;margin:0 auto;width:100%;max-width:420px;aspect-ratio:1;border-radius:16px;background:#0a7a22;border:2px solid rgba(74,222,128,.2);overflow:hidden;box-shadow:0 0 40px rgba(74,222,128,.08)}
#gameCanvas{display:block;width:100%;height:100%;touch-action:none}
.picker-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,10,21,.92);backdrop-filter:blur(6px);z-index:10;padding:20px}
.picker-overlay.hidden{display:none}
.picker-overlay h2{font-size:1.3rem;margin-bottom:12px;color:#4ade80}
.picker-overlay p{color:#888;font-size:.85rem;margin-bottom:16px}
.picker-btn{display:block;width:100%;max-width:240px;padding:12px;margin:6px 0;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s}
.picker-btn.black{background:linear-gradient(135deg,#555,#111);color:#fff}
.picker-btn.white{background:linear-gradient(135deg,#e0e0e0,#fff);color:#111}
.picker-btn:hover{transform:scale(1.03)}
.picker-btn:active{transform:scale(.97)}
.picker-btn.spec{background:rgba(255,255,255,.08);color:#aaa;border:1px solid rgba(255,255,255,.1);margin-top:12px;font-size:.85rem}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,10,21,.88);backdrop-filter:blur(6px);z-index:5;transition:opacity .3s}
.overlay.hidden{opacity:0;pointer-events:none}
.overlay h2{font-size:1.5rem;margin-bottom:4px;color:#4ade80}
.overlay p{color:#888;font-size:.85rem;margin-bottom:12px}
.btn-group{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.btn{padding:8px 24px;border:none;border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#4ade80,#22c55e);color:#0a0a15;box-shadow:0 4px 15px rgba(74,222,128,.3)}
.btn-secondary{background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.1)}
.score-box{display:flex;justify-content:space-around;padding:6px 0 2px;font-size:.85rem}
.score-box div{display:flex;align-items:center;gap:6px}
.score-box .dot{display:inline-block;width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.2)}
.score-box .dot.black{background:#fff;border-color:#888}
.score-box .dot.white{background:#4ade80;border-color:#4ade80}
.spectator-badge{display:inline-block;background:rgba(255,193,7,.15);color:#ffc107;padding:2px 10px;border-radius:999px;font-size:.7rem;font-weight:700}
.chat-toggle{position:fixed;right:14px;bottom:14px;z-index:8;width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,#4ade80,#22c55e);color:#0a0a15;font-size:1.3rem;cursor:pointer;box-shadow:0 4px 15px rgba(74,222,128,.3);transition:all .2s;display:flex;align-items:center;justify-content:center}
.chat-toggle:active{transform:scale(.9)}
.chat-panel{position:fixed;bottom:0;left:0;right:0;z-index:12;background:rgba(10,10,21,.96);backdrop-filter:blur(10px);border-top:1px solid rgba(74,222,128,.15);border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:55dvh;display:flex;flex-direction:column}
.chat-panel.open{transform:translateY(0)}
.chat-header{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.chat-header span{font-size:.85rem;font-weight:700;color:#4ade80}
.chat-close{background:none;border:none;color:#888;font-size:1.2rem;cursor:pointer;padding:4px}
.chat-msgs{flex:1;overflow-y:auto;padding:8px 14px;display:flex;flex-direction:column;gap:4px;min-height:80px}
.chat-msg{text-align:left;font-size:.8rem;padding:6px 10px;border-radius:10px;max-width:85%;word-break:break-word;line-height:1.3}
.chat-msg.me{background:rgba(74,222,128,.12);align-self:flex-end;border-bottom-right-radius:2px}
.chat-msg.other{background:rgba(255,255,255,.06);align-self:flex-start;border-bottom-left-radius:2px}
.chat-msg .author{font-weight:700;font-size:.7rem;opacity:.7;margin-bottom:1px}
.chat-msg .time{font-size:.6rem;opacity:.4;margin-top:2px;text-align:right}
.chat-input-wrap{display:flex;gap:8px;padding:8px 14px 12px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0}
.chat-input{flex:1;background:rgba(255,255,255,.06);border:none;border-radius:10px;padding:10px 14px;color:#fff;font-size:.85rem;outline:none}
.chat-input::placeholder{color:#555}
.chat-send{background:linear-gradient(135deg,#4ade80,#22c55e);border:none;border-radius:10px;color:#0a0a15;font-size:.85rem;font-weight:700;padding:0 16px;cursor:pointer}
.chat-send:active{transform:scale(.95)}
.chat-new-badge{position:absolute;top:-4px;right:-4px;background:#ff6b6b;color:#fff;font-size:.6rem;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;display:none}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(74,222,128,.9);color:#0a0a15;padding:8px 20px;border-radius:10px;font-size:.8rem;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:20}
.toast.show{opacity:1}
@media(max-width:420px){.header h1{font-size:1rem}.status{font-size:.8rem;padding:3px 10px}.picker-overlay h2{font-size:1.2rem}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⚫ OTHELLO ⚪</h1>
    <div class="status" id="statusBar">Loading...</div>
  </div>
  <div class="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
    <div class="picker-overlay" id="pickerOverlay">
      <h2>⚫ Who are you?</h2>
      <p>Select your name to play, or watch as spectator:</p>
      <button class="picker-btn black" id="pickBlack">● Play as Black</button>
      <button class="picker-btn white" id="pickWhite">○ Play as White</button>
      <button class="picker-btn spec" id="pickSpec">👀 Just Watching</button>
    </div>
    <div class="overlay hidden" id="gameOverOverlay">
      <h2 id="winnerText">🏆 Winner!</h2>
      <p style="font-size:2.2rem;font-weight:800;margin:4px 0" id="scoreText">● 0 — ⚪ 0</p>
      <p id="resultText" style="color:#888;font-size:.85rem"></p>
      <div class="btn-group">
        <button class="btn btn-secondary" id="homeBtn">✕ CLOSE</button>
      </div>
    </div>
  </div>
  <div class="score-box">
    <div><span class="dot black"></span> Black: <span id="blackScore">2</span></div>
    <div><span class="dot white"></span> White: <span id="whiteScore">2</span></div>
  </div>
  <div id="playerInfo" style="font-size:.7rem;color:#555;margin-top:4px"></div>
</div>
<button class="chat-toggle" id="chatToggle">💬<span class="chat-new-badge" id="chatBadge">1</span></button>
<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <span>💬 Game Chat</span>
    <button class="chat-close" id="chatClose">✕</button>
  </div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-input-wrap" id="chatInputWrap" style="display:none">
    <input class="chat-input" id="chatInput" placeholder="Type a message..." maxlength="500">
    <button class="chat-send" id="chatSend">Send</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const statusBar=document.getElementById('statusBar');
const blackScore=document.getElementById('blackScore'),whiteScore=document.getElementById('whiteScore');
const pickerOverlay=document.getElementById('pickerOverlay'),gameOverOverlay=document.getElementById('gameOverOverlay');
const pickBlack=document.getElementById('pickBlack'),pickWhite=document.getElementById('pickWhite'),pickSpec=document.getElementById('pickSpec');
const winnerText=document.getElementById('winnerText'),scoreText=document.getElementById('scoreText');
const resultText=document.getElementById('resultText'),playerInfo=document.getElementById('playerInfo');
const homeBtn=document.getElementById('homeBtn'),toast=document.getElementById('toast');
const chatToggle=document.getElementById('chatToggle'),chatBadge=document.getElementById('chatBadge');
const chatPanel=document.getElementById('chatPanel'),chatClose=document.getElementById('chatClose');
const chatMsgs=document.getElementById('chatMsgs'),chatInput=document.getElementById('chatInput');
const chatSend=document.getElementById('chatSend'),chatInputWrap=document.getElementById('chatInputWrap');

const tg=window.Telegram?.WebApp;tg?.expand();
const params=new URLSearchParams(window.location.search);
const gameId=params.get('game_id');
const myId=tg?.initDataUnsafe?.user?.id?.toString()||null;
let isSpectator=true,myColor=null,state=null,myName='Player';
let chatOpen=false,lastChatTs=0,chatPollTimer=null;

const SIZE=8;let cellSize,pollTimer;

function resize(){
  const wrap=canvas.parentElement;
  const s=Math.min(wrap.clientWidth,wrap.clientHeight);
  canvas.width=canvas.height=s;cellSize=s/SIZE;draw();
}
window.addEventListener('resize',resize);
new ResizeObserver(resize).observe(canvas.parentElement);

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!state)return;
  const cs=cellSize,b=state.board;
  ctx.fillStyle='#0a7a22';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1;
  for(let i=0;i<=SIZE;i++){
    ctx.beginPath();ctx.moveTo(i*cs,0);ctx.lineTo(i*cs,canvas.height);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*cs);ctx.lineTo(canvas.width,i*cs);ctx.stroke();
  }
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(!b[r][c])continue;
    const x=c*cs+cs/2,y=r*cs+cs/2,rad=cs*.42,isBlack=b[r][c]==='b';
    const isLast=state.last_move&&state.last_move[0]===r&&state.last_move[1]===c;
    ctx.shadowColor='rgba(0,0,0,.3)';ctx.shadowBlur=4;
    const grad=ctx.createRadialGradient(x-rad*.3,y-rad*.3,0,x,y,rad);
    if(isBlack){grad.addColorStop(0,'#555');grad.addColorStop(1,'#111')}
    else{grad.addColorStop(0,'#fff');grad.addColorStop(.5,'#eee');grad.addColorStop(1,'#ccc')}
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    if(isLast){ctx.strokeStyle=isBlack?'#ff6b81':'#e94560';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(x,y,rad+3,0,Math.PI*2);ctx.stroke()}
  }
  if(!state.game_over&&state.valid_moves&&!isSpectator&&myColor===state.turn){
    state.valid_moves.forEach(([r,c])=>{
      const x=c*cs+cs/2,y=r*cs+cs/2;
      ctx.fillStyle='rgba(255,255,255,.25)';ctx.beginPath();ctx.arc(x,y,cs*.12,0,Math.PI*2);ctx.fill()
    });
  }
}

function handleClick(cx,cy){
  if(isSpectator||!state||state.game_over||myColor!==state.turn)return;
  const c=Math.floor(cx/cellSize),r=Math.floor(cy/cellSize);
  if(r<0||r>=SIZE||c<0||c>=SIZE)return;
  if(!state.valid_moves.some(([rr,cc])=>rr==r&&cc==c))return;
  doMove(r,c);
}
canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect();handleClick(e.clientX-r.left,e.clientY-r.top)});
canvas.addEventListener('touchstart',e=>{
  const r=canvas.getBoundingClientRect(),t=e.touches[0];
  handleClick(t.clientX-r.left,t.clientY-r.top);e.preventDefault()
},{passive:false});

async function doMove(r,c){
  try{
    const res=await fetch('/api/othello/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game_id:gameId,user_id:myId||myColor,row:r,col:c})});
    const data=await res.json();
    if(data)applyState(data);
  }catch(e){}
}

function applyState(s){
  state=s;
  blackScore.textContent=s.black_score;whiteScore.textContent=s.white_score;
  const turnName=s.turn==='b'?s.black?.name:s.white?.name;
  if(s.game_over){
    const w=s.winner;
    if(w==='draw'){statusBar.textContent='🤝 Draw! '+s.black_score+' - '+s.white_score;winnerText.textContent='🤝 Draw!'}
    else{
      const wName=w==='black'?s.black?.name:s.white?.name;
      const isMe=!isSpectator&&myColor===(w==='black'?'b':'w');
      winnerText.textContent=(isMe?'🏆 You Win!':'🏆 '+wName+' Wins!');
    }
    scoreText.textContent='● '+s.black_score+' — ⚪ '+s.white_score;
    gameOverOverlay.classList.remove('hidden');
    stopPolling();
    return;
  }
  statusBar.innerHTML='Turn: <b>'+turnName+'</b> ('+(s.turn==='b'?'●':'○')+')'+(isSpectator?' <span class="spectator-badge">👀 Watching</span>':'');
  playerInfo.textContent=s.black?.name+' (●) vs '+s.white?.name+' (○)';
  draw();
}

async function pollState(){
  if(!gameId)return;
  try{
    const res=await fetch('/api/othello/state?game_id='+gameId);
    const data=await res.json();
    if(data&&data.board)applyState(data);
  }catch(e){}
}

function startPolling(){pollTimer=setInterval(pollState,2000)}
function stopPolling(){if(pollTimer){clearInterval(pollTimer);pollTimer=null}}

// ---- Chat ----
async function pollChat(){
  if(!gameId||!chatOpen)return;
  try{
    const res=await fetch('/api/othello/chat?game_id='+gameId);
    const msgs=await res.json();
    if(!msgs||!msgs.length)return;
    const oldLen=chatMsgs.children.length;
    msgs.forEach(m=>{
      if(m.ts<=lastChatTs)return;
      addChatMsg(m,false);
      lastChatTs=m.ts;
    });
    if(chatMsgs.children.length>oldLen&&!chatOpen)badgeNew();
  }catch(e){}
}

function badgeNew(){
  chatBadge.style.display='flex';chatBadge.textContent='N';
}
function badgeClear(){
  chatBadge.style.display='none';
}

function addChatMsg(m,prepend){
  const div=document.createElement('div');
  const isMe=m.user_id===myId;
  div.className='chat-msg '+(isMe?'me':'other');
  const d=new Date(m.ts*1000);
  const time=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  div.innerHTML='<div class="author'+(isMe?'" style="color:#4ade80"':'')+'">'+escHtml(m.name)+'</div>'+escHtml(m.text)+'<div class="time">'+time+'</div>';
  if(prepend)chatMsgs.prepend(div);
  else{chatMsgs.appendChild(div);chatMsgs.scrollTop=chatMsgs.scrollHeight}
}

function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

async function sendChat(){
  const text=chatInput.value.trim();
  if(!text)return;
  chatInput.value='';
  try{
    await fetch('/api/othello/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game_id:gameId,user_id:myId,name:myName,text:text})});
    // immediately poll to show own message
    await pollChat();
  }catch(e){}
}

chatToggle.addEventListener('click',()=>{
  chatOpen=!chatOpen;
  chatPanel.classList.toggle('open',chatOpen);
  badgeClear();
  if(chatOpen){chatMsgs.scrollTop=chatMsgs.scrollHeight;pollChat()}
});
chatClose.addEventListener('click',()=>{chatOpen=false;chatPanel.classList.remove('open')});
chatInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendChat()}});
chatSend.addEventListener('click',sendChat);

async function init(){
  if(!gameId){statusBar.textContent='❌ No game ID';return}
  const res=await fetch('/api/othello/state?game_id='+gameId);
  const data=await res.json();
  if(!data||!data.board){statusBar.textContent='❌ Game not found';return}

  state=data;

  // Try Mini App auto-identify
  if(tg&&myId){
    if(data.black?.id===myId){myColor='b';isSpectator=false;myName=data.black.name}
    else if(data.white?.id===myId){myColor='w';isSpectator=false;myName=data.white.name}
    if(!isSpectator){
      pickerOverlay.classList.add('hidden');
      applyState(data);
      startPolling();
      chatInputWrap.style.display='flex';
      chatPollTimer=setInterval(pollChat,2000);
      tg?.ready();
      return;
    }
    // Known user but not a player → spectator
    pickerOverlay.classList.add('hidden');
    isSpectator=true;
    myName='Spectator';
    applyState(data);
    startPolling();
    chatPollTimer=setInterval(pollChat,2000);
    return;
  }

  // Browser fallback → show picker
  pickBlack.textContent='● '+(data.black?.name||'Black');
  pickWhite.textContent='○ '+(data.white?.name||'White');
  applyState(data);
  startPolling();
  chatPollTimer=setInterval(pollChat,2000);
}

function pickPlayer(color){
  myColor=color;isSpectator=false;
  myName=color==='b'?state.black.name:state.white.name;
  if(!myId)myId=color==='b'?'black':'white';
  pickerOverlay.classList.add('hidden');
  chatInputWrap.style.display='flex';
  showToast('Playing as '+(color==='b'?'Black':'White'));
  draw();
}

pickBlack.addEventListener('click',()=>pickPlayer('b'));
pickWhite.addEventListener('click',()=>pickPlayer('w'));
pickSpec.addEventListener('click',()=>{
  pickerOverlay.classList.add('hidden');
  isSpectator=true;
  myName='Spectator';
  showToast('👀 Watching');
});
homeBtn.addEventListener('click',()=>{stopPolling();gameOverOverlay.classList.add('hidden')});
function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1500)}
init();resize();
</script>
</body>
</html>
