<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Othello · 2P</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;font-family:'Segoe UI',system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100dvh;overflow:hidden;touch-action:none;user-select:none}
.container{text-align:center;width:100%;max-width:480px;padding:8px;position:relative}
.header{display:flex;justify-content:space-between;align-items:center;padding:4px 8px 8px}
.header h1{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,#4ade80,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.status{font-size:.85rem;padding:4px 12px;border-radius:20px;background:rgba(74,222,128,.1);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status .turn{font-weight:700}
.status .turn.black{color:#fff}
.status .turn.white{color:#4ade80}
.canvas-wrap{position:relative;margin:0 auto;width:100%;max-width:420px;aspect-ratio:1;border-radius:16px;background:#0a7a22;border:2px solid rgba(74,222,128,.2);overflow:hidden;box-shadow:0 0 40px rgba(74,222,128,.08)}
#gameCanvas{display:block;width:100%;height:100%;touch-action:none}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,10,21,.88);backdrop-filter:blur(6px);z-index:5;transition:opacity .3s}
.overlay.hidden{opacity:0;pointer-events:none}
.overlay h2{font-size:1.5rem;margin-bottom:4px;color:#4ade80}
.overlay p{color:#888;font-size:.85rem;margin-bottom:12px}
.overlay .player-box{display:flex;gap:20px;margin:8px 0 16px;font-size:.9rem}
.overlay .player-box div{padding:8px 16px;border-radius:10px;background:rgba(255,255,255,.06);min-width:100px}
.overlay .player-box .you{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.3)}
.btn-group{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.btn{padding:8px 24px;border:none;border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.btn-primary{background:linear-gradient(135deg,#4ade80,#22c55e);color:#0a0a15;box-shadow:0 4px 15px rgba(74,222,128,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(74,222,128,.4)}
.btn-secondary{background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.1)}
.btn-secondary:hover{background:rgba(255,255,255,.15)}
.score-box{display:flex;justify-content:space-around;padding:6px 0;font-size:.85rem}
.score-box div{display:flex;align-items:center;gap:6px}
.score-box .dot{display:inline-block;width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.2)}
.score-box .dot.black{background:#fff;border-color:#888}
.score-box .dot.white{background:#4ade80;border-color:#4ade80}
.waiting{display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px}
.spinner{width:36px;height:36px;border:4px solid rgba(74,222,128,.2);border-top:4px solid #4ade80;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(74,222,128,.9);color:#0a0a15;padding:8px 20px;border-radius:10px;font-size:.8rem;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:20}
.toast.show{opacity:1}
@media(max-width:420px){.header h1{font-size:1rem}.status{font-size:.8rem;padding:3px 10px}.overlay h2{font-size:1.3rem}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⚫ OTHELLO ⚪</h1>
    <div class="status" id="statusBar">Turn: <span class="turn black" id="turnDisplay">● Black</span></div>
  </div>
  <div class="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
    <div class="overlay hidden" id="waitingOverlay">
      <div class="waiting">
        <div class="spinner"></div>
        <h2 style="font-size:1.2rem;margin:0 0 4px">Waiting for opponent...</h2>
        <p style="font-size:.8rem;color:#888">Searching for a player to match with</p>
      </div>
    </div>
    <div class="overlay hidden" id="gameOverOverlay">
      <h2 id="winnerText">🏆 Winner!</h2>
      <p style="font-size:2.2rem;font-weight:800;margin:4px 0" id="scoreText">● 0 — ⚪ 0</p>
      <p id="resultText" style="color:#888;font-size:.85rem"></p>
      <div class="btn-group">
        <button class="btn btn-secondary" id="homeBtn">✕ CLOSE</button>
      </div>
    </div>
  </div>
  <div class="score-box">
    <div><span class="dot black"></span> Black: <span id="blackScore">2</span></div>
    <div><span class="dot white"></span> White: <span id="whiteScore">2</span></div>
  </div>
  <div id="opponentInfo" style="font-size:.7rem;color:#555;margin-top:4px"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const turnDisplay=document.getElementById('turnDisplay'),statusBar=document.getElementById('statusBar');
const blackScore=document.getElementById('blackScore'),whiteScore=document.getElementById('whiteScore');
const waitingOverlay=document.getElementById('waitingOverlay'),gameOverOverlay=document.getElementById('gameOverOverlay');
const winnerText=document.getElementById('winnerText'),scoreText=document.getElementById('scoreText');
const resultText=document.getElementById('resultText'),opponentInfo=document.getElementById('opponentInfo');
const homeBtn=document.getElementById('homeBtn'),toast=document.getElementById('toast');

const tg=window.Telegram?.WebApp;tg?.expand();
const params=new URLSearchParams(window.location.search);
const gameId=params.get('game_id');
const myId=tg?.initDataUnsafe?.user?.id?.toString()||'anon';
const myName=tg?.initDataUnsafe?.user?.first_name||'Player';

const SIZE=8;let cellSize,state,myColor,pollTimer,animFrame=0;

function resize(){
  const wrap=canvas.parentElement;
  const s=Math.min(wrap.clientWidth,wrap.clientHeight);
  canvas.width=canvas.height=s;cellSize=s/SIZE;draw();
}
window.addEventListener('resize',resize);
new ResizeObserver(resize).observe(canvas.parentElement);

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!state)return;
  const cs=cellSize,b=state.board;
  ctx.fillStyle='#0a7a22';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1;
  for(let i=0;i<=SIZE;i++){
    ctx.beginPath();ctx.moveTo(i*cs,0);ctx.lineTo(i*cs,canvas.height);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*cs);ctx.lineTo(canvas.width,i*cs);ctx.stroke();
  }
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(!b[r][c])continue;
    const x=c*cs+cs/2,y=r*cs+cs/2,rad=cs*.42,isBlack=b[r][c]==='b';
    const isLast=state.last_move&&state.last_move[0]===r&&state.last_move[1]===c;
    ctx.shadowColor='rgba(0,0,0,.3)';ctx.shadowBlur=4;
    const grad=ctx.createRadialGradient(x-rad*.3,y-rad*.3,0,x,y,rad);
    if(isBlack){grad.addColorStop(0,'#555');grad.addColorStop(1,'#111')}
    else{grad.addColorStop(0,'#fff');grad.addColorStop(.5,'#eee');grad.addColorStop(1,'#ccc')}
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    if(isLast){ctx.strokeStyle=isBlack?'#ff6b81':'#e94560';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(x,y,rad+3,0,Math.PI*2);ctx.stroke()}
  }
  if(!state.game_over&&state.valid_moves&&myColor===state.turn){
    state.valid_moves.forEach(([r,c])=>{
      const x=c*cs+cs/2,y=r*cs+cs/2;
      ctx.fillStyle='rgba(255,255,255,.25)';ctx.beginPath();ctx.arc(x,y,cs*.12,0,Math.PI*2);ctx.fill()
    });
  }
}

function handleClick(cx,cy){
  if(!state||state.game_over||myColor!==state.turn)return;
  const c=Math.floor(cx/cellSize),r=Math.floor(cy/cellSize);
  if(r<0||r>=SIZE||c<0||c>=SIZE)return;
  if(!state.valid_moves.some(([rr,cc])=>rr==r&&cc==c))return;
  doMove(r,c);
}

canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect();handleClick(e.clientX-r.left,e.clientY-r.top)});
canvas.addEventListener('touchstart',e=>{
  const r=canvas.getBoundingClientRect(),t=e.touches[0];
  handleClick(t.clientX-r.left,t.clientY-r.top);e.preventDefault()
},{passive:false});

async function doMove(r,c){
  try{
    const res=await fetch('/api/othello/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game_id:gameId,user_id:myId,row:r,col:c})});
    const data=await res.json();
    if(data)applyState(data);
  }catch(e){}
}

function applyState(s){
  state=s;
  blackScore.textContent=s.black_score;whiteScore.textContent=s.white_score;
  const isMyTurn=myColor===s.turn;
  turnDisplay.textContent=s.turn==='b'?'● Black':'○ White';
  turnDisplay.className='turn '+(s.turn==='b'?'black':'white');
  statusBar.textContent='Turn: ';statusBar.appendChild(turnDisplay);
  opponentInfo.textContent=s.black?.name+' vs '+s.white?.name;
  if(s.game_over){
    gameOverOverlay.classList.remove('hidden');
    const w=s.winner;
    if(w==='draw'){winnerText.textContent='🤝 Draw!';scoreText.textContent='● '+s.black_score+' — ⚪ '+s.white_score}
    else{
      const wName=w==='black'?s.black?.name:s.white?.name;
      const isMe=s.black&&s.white&&myColor===(w==='black'?'b':'w');
      winnerText.textContent=(isMe?'🏆 You Win!':'🏆 '+wName+' Wins!');
      scoreText.textContent='● '+s.black_score+' — ⚪ '+s.white_score;
    }
    resultText.textContent=s.black_score+' vs '+s.white_score+' · '+SIZE+'×'+SIZE;
    stopPolling();
  }else if(!s.valid_moves||s.valid_moves.length===0){
    showToast('⏭ No moves — turn passed');
  }
  draw();
}

async function pollState(){
  if(!gameId)return;
  try{
    const res=await fetch('/api/othello/state?game_id='+gameId+'&user_id='+myId);
    const data=await res.json();
    if(data)applyState(data);
  }catch(e){}
}

function startPolling(){pollTimer=setInterval(pollState,2000)}
function stopPolling(){if(pollTimer){clearInterval(pollTimer);pollTimer=null}}

async function init(){
  if(!gameId){showToast('❌ No game ID');return}
  waitingOverlay.classList.remove('hidden');
  tg?.ready();
  const res=await fetch('/api/othello/state?game_id='+gameId+'&user_id='+myId);
  const data=await res.json();
  if(!data){showToast('❌ Game not found');return}
  if(data.black?.id===myId)myColor='b';
  else if(data.white?.id===myId)myColor='w';
  else{showToast('❌ Not your game');return}
  waitingOverlay.classList.add('hidden');
  applyState(data);
  startPolling();
}

function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1500)}

homeBtn.addEventListener('click',()=>{stopPolling();gameOverOverlay.classList.add('hidden')});
init();resize();
</script>
</body>
</html>
